spring:
  application:
    name: see-something-abq

  profiles:
    active:
      - service
      - local

  datasource:
    url: "jdbc:h2:file:./db/see-something-abq"

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

storage:
  applicationHome: true
  directory: uploads
  whiteList:
    - image/jpeg
    - image/png
    - image/gif
    - image/webp
  filename:
    unknown: unknown
    format: "%1$s.%2$s"
    randomizerLimit: 0
    timestamp:
      format: "yyyyMMdd-HHmmss"
      timeZone: "UTC"

# App is deployed behind a reverse proxy (Apache + SSL). Enable proxy header support so URL
# generation (e.g., ServletUriComponentsBuilder.fromCurrentContextPath) reflects the public
# scheme/host/port (via X-Forwarded-* headers) rather than the internal connector (e.g., :8080).
server:
  forward-headers-strategy: framework
